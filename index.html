<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Expo Floorplan</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>Int'l Hospital Expo @ ICE BSD 2026</header>

<div class="container">

    <div class="searchWrapper">
        <input type="text" id="searchBox" placeholder="🔍 Search exhibitor or booth..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <!-- 🔥 INTERACTIVE LEGEND -->
    <div id="legend">
        <div class="legend-item available active" data-status="available">
            <span class="legend-dot"></span>
            <span>Available</span>
            <b class="count">0</b>
        </div>
        <div class="legend-item sold active" data-status="sold">
            <span class="legend-dot"></span>
            <span>Sold</span>
            <b class="count">0</b>
        </div>
        <div class="legend-item booked active" data-status="booked">
            <span class="legend-dot"></span>
            <span>Booked</span>
            <b class="count">0</b>
        </div>
        <div class="legend-item agent active" data-status="agent">
            <span class="legend-dot"></span>
            <span>Agent</span>
            <b class="count">0</b>
        </div>
    </div>

    <div id="menu">
        <button id="zoomIn">Zoom In +</button>
        <button id="zoomOut">Zoom Out -</button>
    </div>

    <div id="floorContainer">
        <div id="floor"></div>
    </div>

</div>

<div id="sidePanel" class="hidden">
    <h3>Booth Info</h3>
    <div id="panelContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
